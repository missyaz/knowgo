apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowgo-rag
  namespace: application
  labels:
    app: knowgo-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowgo-rag
  template:
    metadata:
      labels:
        app: knowgo-rag
    spec:
      containers:
      - name: knowgo-rag
        image: {{ACR_REGISTRY}}/knowgo/knowgo-rag:{{IMAGE_TAG}}  # 后续通过环境变量替换
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: {{ENVIRONMENT}}
        - name: DASHSCOPE_API_KEY
          value: {{DASHSCOPE_API_KEY}}
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: knowgo-rag
  namespace: application
spec:
  selector:
    app: knowgo-rag
  ports:
  - port: 80
    targetPort: 8081
  type: ClusterIP