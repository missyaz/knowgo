name: [RAG-02] Image Build & Push to ACR

# 触发条件：1. 流水线 1 成功完成  2. 手动触发
on:
  workflow_run:
    workflows: [ "[RAG-01] Full Project Build (Dependency Resolve)" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: latest commit SHA)'
        required: false
        default: ''

jobs:
  rag-image-build-push:
    runs-on: ubuntu-latest
    if: >
      (github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Restore RAG Maven Artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.m2/repository/com/fw/
            KnowGo-business/KnowGo-rag/target/
          key: ${{ runner.os }}-rag-maven-${{ env.IMAGE_TAG }}

      - name: Configure ACR Authentication
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push RAG Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .  # 根目录作为构建上下文（确保能复制到父 POM）
          file: KnowGo-business/KnowGo-rag/Dockerfile  # RAG 模块 Dockerfile 路径
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/knowgo/knowgo-rag:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_REGISTRY }}/knowgo/knowgo-rag:dev
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        env:
          DOCKER_BUILDKIT: 1

      - name: Verify RAG Image Push
        run: |
          echo "=== Verifying RAG Image ==="
          docker pull ${{ secrets.ACR_REGISTRY }}/knowgo/knowgo-rag:${{ env.IMAGE_TAG }}
          echo "RAG Image pushed to ACR successfully!"

      - name: Clean Up Docker Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache