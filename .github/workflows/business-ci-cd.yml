name: Build & Push Microservice Images (Java 21)

on:
  push:
    branches: [ main ]
    paths:
      - 'KnowGo-business/**'
      - 'KnowGo-server/**'
      - 'KnowGo-common/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'KnowGo-business/**'
      - 'KnowGo-server/**'
      - 'KnowGo-common/**'
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [server, rag, business]
        include:
#          - module: server
#            port: 8080
#            context: KnowGo-server
          - module: rag
            port: 8081
            context: KnowGo-business/KnowGo-rag
#          - module: business
#            port: 8082
#            context: KnowGo-business/KnowGo-business

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21  # 核心更新：切换为Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'  # 指定Java 21
          distribution: 'temurin'  # Temurin OpenJDK（支持Java 21，兼容性好）
          cache: maven

      - name: Configure ACR authentication
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          # 定义镜像信息
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ secrets.ACR_REGISTRY }}/knowgo/knowgo-${{ matrix.module }}:${IMAGE_TAG}
          
          # 构建并推送镜像（使用模块目录下的Java 21版Dockerfile）
          docker build -t $IMAGE_NAME -f ${{ matrix.context }}/Dockerfile ${{ matrix.context }}
          docker push $IMAGE_NAME 

      - name: Print image info
        run: |
          echo "Built and pushed Java 21 image: ${{ secrets.ACR_REGISTRY }}/knowgo/knowgo-${{ matrix.module }}:${{ github.sha }}"